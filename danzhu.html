<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>张轶尘-在线2D弹珠</title>
    <style>
        /* 极简样式，保留核心布局 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #151a28;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: pan-y;
        }
        .game-wrapper {
            background: #0b0e17;
            border-radius: 28px;
            padding: 14px 14px 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.8);
            max-width: 400px;
            width: fit-content;
            margin: 10px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 360 / 480;
            background: #1b2137;
            border-radius: 18px;
            box-shadow: inset 0 0 0 1px #3f4663, 0 6px 14px rgba(0,0,0,0.6);
            touch-action: none;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        canvas.paused {
            opacity: 0.6;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 2px;
            position: relative;
        }
        .left-group {
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
        }
        /* 返回按钮 + hover效果 */
        .back-btn {
            background: #272e47;
            border: none;
            color: #d6def5;
            font-size: 1.15rem;
            font-weight: 500;
            padding: 5px 16px 7px 14px;
            border-radius: 60px;
            box-shadow: 0 4px 0 #10131f;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.15s ease;
            display: flex;
            align-items: center;
            gap: 3px;
            letter-spacing: 0.2px;
            touch-action: manipulation;
        }
        .back-btn:hover {
            background: #3a4468;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #10131f;
        }
        .back-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #10131f;
            transition-duration: 0.05s;
        }
        /* 标题居中 */
        .game-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #d6def5;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: #1a213b;
            padding: 4px 20px;
            border-radius: 40px;
            box-shadow: inset 0 1px 4px #080b13;
            white-space: nowrap;
        }
        .score-badge {
            background: #272e47;
            color: #b7c2ea;
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 1.15rem;
            font-weight: 600;
            box-shadow: inset 0 1px 4px #080b13;
            z-index: 1;
        }
        .score-badge span {
            color: #f5edb0;
            margin-right: 3px;
        }
        /* 底部控制区：模式切换 + 暂停按钮 */
        .bottom-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            padding: 0 4px;
            gap: 12px;
            flex-wrap: wrap;
        }
        /* 模式切换按钮 */
        .status-tip {
            color: #bcc6e8;
            font-size: 0.9rem;
            background: #1a213b;
            padding: 3px 18px;
            border-radius: 40px;
            display: inline-block;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
            border: 2px solid transparent;
        }
        .status-tip:hover {
            background: #2a3355;
            border-color: #4a5580;
            transform: scale(1.02);
        }
        .status-tip:active {
            transform: scale(0.96);
        }
        /* 地狱模式特殊样式 (闪烁边框) */
        .status-tip.hell-mode {
            border-color: #ff4444;
            animation: hellPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes hellPulse {
            0% { border-color: #ff4444; box-shadow: 0 0 8px rgba(255,68,68,0.3); }
            100% { border-color: #ff8800; box-shadow: 0 0 20px rgba(255,68,68,0.7); }
        }

        /* 暂停按钮 - 底部样式 */
        .pause-btn {
            background: #272e47;
            border: none;
            color: #d6def5;
            font-size: 1.3rem;
            font-weight: 500;
            padding: 3px 18px 5px 18px;
            border-radius: 60px;
            box-shadow: 0 4px 0 #10131f;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            touch-action: manipulation;
            min-width: 60px;
            line-height: 1.4;
        }
        .pause-btn:hover {
            background: #3a4468;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #10131f;
        }
        .pause-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #10131f;
            transition-duration: 0.05s;
        }
        .pause-btn.paused-state {
            background: #3a3355;
        }

        .hint {
            color: #5f6a90;
            text-align: center;
            margin-top: 8px;
            font-size: 0.8rem;
            letter-spacing: 0.4px;
            opacity: 0.7;
        }
        /* 暂停覆盖层 - 仅图标 */
        .pause-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.85);
            font-size: 4.5rem;
            font-weight: bold;
            text-shadow: 0 0 40px rgba(0,0,0,0.9), 0 0 80px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            line-height: 1;
        }
        .pause-overlay.show {
            display: block;
        }
        .canvas-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    
<div class="game-wrapper">
    <!-- 顶部: 返回 + 居中标题 + 分数 -->
    <div class="top-bar">
        <div class="left-group">
            <button class="back-btn" id="backButton" aria-label="返回">← 返回</button>
        </div>
        <span class="game-title">西米太累2D弹珠</span>
        <div class="score-badge"><span>🏆</span> <span id="scoreDisplay">0</span></div>
    </div>

    <!-- 画布 360x480 -->
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="360" height="480"></canvas>
        <div class="pause-overlay" id="pauseOverlay">⏸</div>
    </div>

    <!-- 底部控制区：模式切换 + 暂停按钮 -->
    <div class="bottom-controls">
        <span class="status-tip" id="statusMessage">⚡ 极速模式</span>
        <button class="pause-btn" id="pauseButton">⏸</button>
    </div>
    
    <div class="hint">©张轶尘 Copyright 2026</div>
</div>

<script>
    (function() {
        // ----- 画布 & 上下文 -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusMsg = document.getElementById('statusMessage');
        const pauseBtn = document.getElementById('pauseButton');
        const pauseOverlay = document.getElementById('pauseOverlay');

        // ----- 固定尺寸 360x480 -----
        const CW = 360;
        const CH = 480;
        canvas.width = CW;
        canvas.height = CH;

        // ----- 游戏参数 -----
        const PADDLE_WIDTH = 68;
        const PADDLE_HEIGHT = 12;
        const PADDLE_Y = CH - 36;
        const BALL_RADIUS = 8;

        // 三种速度配置
        const SPEED_CONFIG = {
            fast: {
                init: 7.2,
                max: 10.5,
                increment: 0.5,
                label: '⚡ 极速模式',
                cssClass: ''
            },
            slow: {
                init: 3.8,
                max: 6.5,
                increment: 0.3,
                label: '🐢 慢速模式',
                cssClass: ''
            },
            hell: {
                init: 11.0,
                max: 16.0,
                increment: 0.9,
                label: '🔥 地狱模式',
                cssClass: 'hell-mode'
            }
        };

        // 模式循环顺序
        const MODE_ORDER = ['fast', 'slow', 'hell'];

        // ----- 游戏状态 -----
        let currentModeIndex = 0;
        let paddleX = (CW - PADDLE_WIDTH) / 2;
        let ball = {
            x: CW/2,
            y: 90,
            vx: 3.6,
            vy: 5.0,
            radius: BALL_RADIUS
        };
        let score = 0;
        let gameActive = true;
        let isPaused = false;
        let animationFrame = null;
        let isDragging = false;
        let dragOffsetX = 0;

        // ----- 获取当前模式 -----
        function getCurrentMode() {
            return MODE_ORDER[currentModeIndex];
        }

        function getSpeedConfig() {
            return SPEED_CONFIG[getCurrentMode()];
        }

        // ----- 重置 (分数归零) -----
        function resetGame() {
            const config = getSpeedConfig();
            paddleX = (CW - PADDLE_WIDTH) / 2;
            ball.x = CW/2;
            ball.y = 70 + Math.random() * 50;
            const angle = (Math.random() * 0.9 + 0.15) * (Math.random() > 0.5 ? 1 : -1);
            const speed = config.init;
            ball.vx = Math.cos(angle) * speed * 0.9;
            ball.vy = Math.sin(angle) * speed + 1.2;
            if (ball.vy > -0.3) ball.vy = -1.8;
            score = 0;
            scoreSpan.textContent = '0';
            gameActive = true;
            updateStatusDisplay();
            updatePauseUI();
        }

        function fullReset() {
            resetGame();
        }

        // ----- 更新状态显示 -----
        function updateStatusDisplay() {
            const config = getSpeedConfig();
            statusMsg.innerText = config.label;
            statusMsg.style.color = '#c8d0e8';
            statusMsg.classList.remove('hell-mode');
            if (config.cssClass) {
                statusMsg.classList.add(config.cssClass);
            }
        }

        // ----- 暂停切换 (单击图标继续) -----
        function togglePause() {
            // 游戏结束时不允许暂停
            if (!gameActive) return;
            isPaused = !isPaused;
            updatePauseUI();
        }

        function updatePauseUI() {
            if (isPaused) {
                pauseBtn.textContent = '▶';
                pauseBtn.classList.add('paused-state');
                pauseOverlay.classList.add('show');
                canvas.classList.add('paused');
            } else {
                pauseBtn.textContent = '⏸';
                pauseBtn.classList.remove('paused-state');
                pauseOverlay.classList.remove('show');
                canvas.classList.remove('paused');
            }
        }

        // ----- 切换模式 (循环) -----
        function toggleMode() {
            if (isPaused) return;
            currentModeIndex = (currentModeIndex + 1) % MODE_ORDER.length;
            updateStatusDisplay();
            fullReset();
        }

        // ----- 更新逻辑 -----
        function updateGame() {
            if (!gameActive || isPaused) return;

            ball.x += ball.vx;
            ball.y += ball.vy;

            // 左右边界
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx = -ball.vx;
            } else if (ball.x + ball.radius > CW) {
                ball.x = CW - ball.radius;
                ball.vx = -ball.vx;
            }

            // 上边界
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy;
            }

            // 挡板碰撞
            if (ball.vy > 0) {
                const paddleLeft = paddleX;
                const paddleRight = paddleX + PADDLE_WIDTH;
                const paddleTop = PADDLE_Y;
                const paddleBottom = PADDLE_Y + PADDLE_HEIGHT;

                const ballBottom = ball.y + ball.radius;
                const ballTop = ball.y - ball.radius;
                const ballLeft = ball.x - ball.radius;
                const ballRight = ball.x + ball.radius;

                if (ballBottom >= paddleTop && ballTop <= paddleBottom && 
                    ballRight >= paddleLeft && ballLeft <= paddleRight) {

                    let hitPos = (ball.x - paddleLeft) / PADDLE_WIDTH;
                    hitPos = Math.min(1, Math.max(0, hitPos));
                    const angle = (hitPos - 0.5) * 2.0;
                    const config = getSpeedConfig();
                    const currentSpeed = Math.min(config.max, Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) + config.increment);
                    const newVx = Math.sin(angle) * currentSpeed;
                    const newVy = -Math.cos(angle) * currentSpeed;

                    ball.vx = newVx;
                    ball.vy = newVy;
                    ball.y = paddleTop - ball.radius - 0.5;

                    score++;
                    scoreSpan.textContent = score;
                    statusMsg.innerText = '✨ +1';
                    statusMsg.style.color = '#d6e6a0';
                    statusMsg.classList.remove('hell-mode');
                    setTimeout(() => {
                        if (gameActive && !isPaused) {
                            updateStatusDisplay();
                        } else if (gameActive && isPaused) {
                            const configNow = getSpeedConfig();
                            statusMsg.innerText = configNow.label;
                            statusMsg.style.color = '#c8d0e8';
                            if (configNow.cssClass) {
                                statusMsg.classList.add(configNow.cssClass);
                            }
                        }
                    }, 150);
                }
            }

            // 落底 (游戏结束)
            if (ball.y + ball.radius > CH) {
                gameActive = false;
                statusMsg.innerText = '💔 点击继续';
                statusMsg.style.color = '#f7a9a9';
                statusMsg.classList.remove('hell-mode');
                ball.y = CH - ball.radius;
                ball.vy = 0;
                ball.vx = 0;
                if (isPaused) {
                    isPaused = false;
                    updatePauseUI();
                }
            }

            if (ball.x - ball.radius < -10) ball.x = ball.radius;
            if (ball.x + ball.radius > CW + 10) ball.x = CW - ball.radius;
        }

        // ----- 绘制 -----
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // 细网格
            ctx.strokeStyle = '#2c334d';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < CW; i += 28) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CH);
                ctx.strokeStyle = '#2c334d';
                ctx.stroke();
            }
            for (let i = 0; i < CH; i += 28) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CW, i);
                ctx.strokeStyle = '#2c334d';
                ctx.stroke();
            }

            // 挡板
            const isHell = (getCurrentMode() === 'hell');
            const pX = paddleX, pY = PADDLE_Y;
            ctx.shadowColor = isHell ? '#ff4444' : '#7b8bc9';
            ctx.shadowBlur = isHell ? 30 : 16;
            ctx.fillStyle = isHell ? '#ff8866' : '#b0c2f5';
            ctx.beginPath();
            ctx.roundRect(pX, pY, PADDLE_WIDTH, PADDLE_HEIGHT, 10);
            ctx.fill();
            ctx.shadowBlur = isHell ? 16 : 6;
            ctx.fillStyle = isHell ? '#ffaa88' : '#d4e0ff';
            ctx.beginPath();
            ctx.roundRect(pX+4, pY-2, PADDLE_WIDTH-8, 6, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = isHell ? '#cc3333' : '#3e487a';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.roundRect(pX, pY, PADDLE_WIDTH, PADDLE_HEIGHT, 10);
            ctx.stroke();

            // 球
            let ballColor, ballHighlight, ballGlow;
            if (isHell) {
                ballColor = '#ff5533';
                ballHighlight = '#ff8855';
                ballGlow = '#ff3333';
            } else if (getCurrentMode() === 'fast') {
                ballColor = '#fcf5b0';
                ballHighlight = '#fff9d6';
                ballGlow = '#c8daff';
            } else {
                ballColor = '#b0d4f0';
                ballHighlight = '#d4ecff';
                ballGlow = '#8ab8d4';
            }
            ctx.shadowColor = isHell ? '#ff2222' : ballGlow;
            ctx.shadowBlur = isHell ? 35 : 26;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ballColor;
            ctx.fill();
            ctx.shadowBlur = isHell ? 18 : 12;
            ctx.fillStyle = ballHighlight;
            ctx.beginPath();
            ctx.arc(ball.x-2, ball.y-2, ball.radius*0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = isHell ? '#ffccaa' : '#fffde7';
            ctx.beginPath();
            ctx.arc(ball.x-3, ball.y-5, 2.8, 0, Math.PI*2);
            ctx.fill();

            // 底部线
            ctx.strokeStyle = isHell ? '#cc4444' : '#6a4f5e';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 10]);
            ctx.beginPath();
            ctx.moveTo(10, CH-8);
            ctx.lineTo(CW-10, CH-8);
            ctx.stroke();
            ctx.setLineDash([]);

            if (!gameActive) {
                ctx.font = 'bold 26px system-ui, sans-serif';
                ctx.fillStyle = '#f0d8d8';
                ctx.shadowColor = '#2a0a0a';
                ctx.shadowBlur = 24;
                ctx.fillText('☠ 失败', CW/2-68, CH/2-10);
                ctx.shadowBlur = 0;
            }
        }

        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        // ----- 循环 -----
        function gameLoop() {
            updateGame();
            draw();
            animationFrame = requestAnimationFrame(gameLoop);
        }

        // ----- 拖拽控制 (鼠标/触摸) -----
        function handleStart(e) {
            if (isPaused) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const canvasX = (clientX - rect.left) * scaleX;
            const pLeft = paddleX, pRight = paddleX + PADDLE_WIDTH;
            
            if (!gameActive) {
                fullReset();
                const newPLeft = paddleX, newPRight = paddleX + PADDLE_WIDTH;
                if (canvasX >= newPLeft - 12 && canvasX <= newPRight + 12) {
                    isDragging = true;
                    dragOffsetX = canvasX - paddleX;
                }
                return;
            }

            if (canvasX >= pLeft - 12 && canvasX <= pRight + 12) {
                isDragging = true;
                dragOffsetX = canvasX - paddleX;
            }
        }

        function handleMove(e) {
            if (isPaused) return;
            e.preventDefault();
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let canvasX = (clientX - rect.left) * scaleX;
            let newPaddleX = canvasX - dragOffsetX;
            newPaddleX = Math.min(CW - PADDLE_WIDTH, Math.max(0, newPaddleX));
            paddleX = newPaddleX;
        }

        function handleEnd(e) {
            e.preventDefault();
            isDragging = false;
        }

        // ----- 事件绑定 -----
        function attachEvents() {
            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('touchstart', handleStart, { passive: false });
            window.addEventListener('touchmove', handleMove, { passive: false });
            window.addEventListener('touchend', handleEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleEnd, { passive: false });

            // 暂停按钮 (单击切换)
            pauseBtn.addEventListener('click', togglePause);
            pauseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                togglePause();
            }, { passive: false });

            // 点击状态文字切换模式
            statusMsg.addEventListener('click', toggleMode);
            statusMsg.addEventListener('touchstart', function(e) {
                e.preventDefault();
                toggleMode();
            }, { passive: false });
        }

        // ----- 返回按钮 -----
        document.getElementById('backButton').addEventListener('click', function() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'about:blank';
        });

        // ----- 启动 -----
        function init() {
            currentModeIndex = 0;
            fullReset();
            attachEvents();
            updatePauseUI();
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(gameLoop);
        }
        init();

        window.addEventListener('beforeunload', function() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
        });
    })();
</script>
</body>
</html>
